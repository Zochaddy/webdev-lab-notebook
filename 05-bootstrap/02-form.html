<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center">
      <form
        action="/submit"
        class="ira-form container mt-5 border border-2 bg-white rounded"
      >
        <div class="row col-12 my-3">
          <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="balance"
            >Balance ($)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="text" id="balance" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="annual_contribution"
            >Annual contribution ($)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="text" id="annual_contribution" />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-sm-6 col-form-label">
            Maximize contributions?
          </legend>
          <div class="col-sm-6">
            <input
              type="radio"
              class="form-check-input"
              name="maximize_contributions"
              id="yes"
            />
            <label class="form-check-label" for="yes">Yes</label>
            <input
              type="radio"
              class="form-check-input"
              name="maximize_contributions"
              id="no"
            />
            <label class="form-check-label" for="no">No</label>
          </div>
        </fieldset>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="rate_return"
            >Expected rate of return (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" id="rate_return" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="age">Current age</label>
          <div class="col-sm-6">
            <input class="form-control" type="number" id="age" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="age_retirement"
            >Retirement age</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" id="age_retirement" />
          </div>
        </div>

        <div class="row mb-3">
          <label class="col-sm-6 col-form-label" for="tax_rate"
            >Marginal tax rate (%)</label
          >
          <div class="col-sm-6">
            <input class="form-control" type="number" id="tax_rate" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-sm-6">
            <input
              class="btn btn-primary w-100"
              type="submit"
              value="Calculate"
            />
          </div>
          <div class="col-sm-6">
            <input
              class="btn btn-outline-secondary w-100"
              type="reset"
              value="Reset"
            />
          </div>
        </div>

        <div class="row mb-3">
          <p class="text-muted small">
            This exercise is a simplified version of the Roth IRA Calculator at
            <a href="https://www.calculator.net/roth-ira-calculator.html"
              >Calculator.net</a
            >
          </p>
        </div>
      </form>
    </main>
  </body>
</html>
